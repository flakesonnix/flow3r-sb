<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" font-family="monospace">
  <rect width="500" height="280" fill="#0a0a0f" rx="12"/>
  <text x="250" y="28" fill="#ff69b4" font-size="16" font-weight="bold" text-anchor="middle">Connection Flow</text>

  <!-- Step 1: Open app -->
  <rect x="20" y="50" width="110" height="60" rx="8" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="75" y="72" fill="#fff" font-size="11" text-anchor="middle">Open</text>
  <text x="75" y="88" fill="#fff" font-size="11" text-anchor="middle">S&amp;B Control</text>
  <text x="75" y="104" fill="#888" font-size="9" text-anchor="middle">Apps menu</text>

  <!-- Arrow 1 -->
  <line x1="132" y1="80" x2="155" y2="80" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="144" y="72" fill="#888" font-size="8" text-anchor="middle">tap</text>

  <!-- Step 2: Press App button -->
  <rect x="158" y="50" width="110" height="60" rx="8" fill="#1a1a2e" stroke="#ff69b4" stroke-width="2"/>
  <text x="213" y="72" fill="#ff69b4" font-size="11" text-anchor="middle">Press APP</text>
  <text x="213" y="88" fill="#fff" font-size="11" text-anchor="middle">button to</text>
  <text x="213" y="104" fill="#fff" font-size="11" text-anchor="middle">start scan</text>

  <!-- Arrow 2 -->
  <line x1="270" y1="80" x2="293" y2="80" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="282" y="72" fill="#888" font-size="8" text-anchor="middle">BLE</text>

  <!-- Step 3: Scanning -->
  <rect x="296" y="50" width="110" height="60" rx="8" fill="#1a1a2e" stroke="#0088ff" stroke-width="2"/>
  <text x="351" y="72" fill="#0088ff" font-size="11" text-anchor="middle">Scanning...</text>
  <text x="351" y="88" fill="#fff" font-size="11" text-anchor="middle">LED ring</text>
  <text x="351" y="104" fill="#888" font-size="9" text-anchor="middle">breathing blue</text>

  <!-- Arrow 3 -->
  <line x1="351" y1="112" x2="351" y2="135" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="375" y="125" fill="#888" font-size="8">found</text>

  <!-- Step 4: Device found -->
  <rect x="270" y="138" width="160" height="55" rx="8" fill="#1a1a2e" stroke="#ff8c00" stroke-width="2"/>
  <text x="350" y="160" fill="#ff8c00" font-size="11" text-anchor="middle">S&amp;B VY-XXXX</text>
  <text x="350" y="176" fill="#888" font-size="10" text-anchor="middle">auto-connects strongest</text>

  <!-- Arrow 4 -->
  <line x1="350" y1="195" x2="350" y2="218" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="375" y="208" fill="#888" font-size="8">BLE</text>

  <!-- Step 5: Connected -->
  <rect x="270" y="220" width="160" height="45" rx="8" fill="#0a2a0a" stroke="#00ff88" stroke-width="2"/>
  <text x="350" y="238" fill="#00ff88" font-size="12" font-weight="bold" text-anchor="middle">Connected!</text>
  <text x="350" y="254" fill="#888" font-size="10" text-anchor="middle">use petals to control</text>

  <!-- Arrow from scan back to disconnect -->
  <line x1="270" y1="80" x2="235" y2="242" stroke="#ff4444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="225" y="170" fill="#ff4444" font-size="8" transform="rotate(-45, 225, 170)">APP btn = disconnect</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
  </defs>
</svg>
