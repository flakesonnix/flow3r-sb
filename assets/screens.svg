<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 360" font-family="monospace">
  <rect width="500" height="360" fill="#0a0a0f" rx="12"/>
  <text x="250" y="28" fill="#ff69b4" font-size="16" font-weight="bold" text-anchor="middle">Screen States</text>

  <!-- State 1: Disconnected -->
  <rect x="15" y="45" width="145" height="145" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="88" y="65" fill="#888" font-size="8" text-anchor="middle">DISCONNECTED</text>
  <text x="88" y="95" fill="#fff" font-size="14" text-anchor="middle">S&amp;B Control</text>
  <text x="88" y="118" fill="#666" font-size="10" text-anchor="middle">Press App btn</text>
  <text x="88" y="132" fill="#666" font-size="10" text-anchor="middle">to scan</text>
  <!-- LED ring -->
  <circle cx="88" cy="170" r="6" fill="#222" stroke="#4488ff" stroke-width="1"/>
  <text x="88" y="185" fill="#888" font-size="7" text-anchor="middle">LED: dim</text>

  <!-- State 2: Scanning -->
  <rect x="178" y="45" width="145" height="145" rx="4" fill="#111" stroke="#0088ff" stroke-width="1"/>
  <text x="250" y="65" fill="#0088ff" font-size="8" text-anchor="middle">SCANNING</text>
  <text x="250" y="95" fill="#0088ff" font-size="14" text-anchor="middle">Scanning...</text>
  <text x="250" y="118" fill="#0f8" font-size="10" text-anchor="middle">Found: S&amp;B VY</text>
  <text x="250" y="132" fill="#0f8" font-size="10" text-anchor="middle">(-42 dBm)</text>
  <!-- LED ring breathing -->
  <circle cx="250" cy="170" r="6" fill="#224" stroke="#4488ff" stroke-width="2"/>
  <text x="250" y="185" fill="#888" font-size="7" text-anchor="middle">LED: pulse blue</text>

  <!-- State 3: Connected - Heating -->
  <rect x="340" y="45" width="145" height="145" rx="4" fill="#111" stroke="#ff8c00" stroke-width="1"/>
  <text x="412" y="63" fill="#fff" font-size="8" text-anchor="middle">S&amp;B Venty  85%</text>
  <text x="412" y="105" fill="#ff8c00" font-size="30" font-weight="bold" text-anchor="middle">185.2</text>
  <text x="438" y="92" fill="#888" font-size="10">°C</text>
  <text x="412" y="128" fill="#ccc" font-size="12" text-anchor="middle">Target: 200°C</text>
  <text x="412" y="150" fill="#ff8c00" font-size="11" text-anchor="middle">HEATER ON</text>
  <text x="412" y="170" fill="#555" font-size="7" text-anchor="middle">-10  -5  ON/OFF  +5  +10</text>
  <!-- LED ring partial -->
  <circle cx="412" cy="183" r="6" fill="#ff6600"/>
  <text x="412" y="195" fill="#888" font-size="7" text-anchor="middle">LED: orange ring</text>

  <!-- State 4: Connected - At Temp -->
  <rect x="15" y="210" width="145" height="145" rx="4" fill="#111" stroke="#00ff88" stroke-width="1"/>
  <text x="88" y="228" fill="#fff" font-size="8" text-anchor="middle">S&amp;B Venty  85%</text>
  <text x="88" y="270" fill="#00ff88" font-size="30" font-weight="bold" text-anchor="middle">199.8</text>
  <text x="114" y="257" fill="#888" font-size="10">°C</text>
  <text x="88" y="293" fill="#ccc" font-size="12" text-anchor="middle">Target: 200°C</text>
  <text x="88" y="315" fill="#00ff88" font-size="11" text-anchor="middle">HEATER ON</text>
  <text x="88" y="340" fill="#888" font-size="7" text-anchor="middle">LED: green ring ✓</text>

  <!-- State 5: Connected - Cooling -->
  <rect x="178" y="210" width="145" height="145" rx="4" fill="#111" stroke="#4488ff" stroke-width="1"/>
  <text x="250" y="228" fill="#fff" font-size="8" text-anchor="middle">S&amp;B Venty  85%</text>
  <text x="250" y="270" fill="#4488ff" font-size="30" font-weight="bold" text-anchor="middle">175.0</text>
  <text x="276" y="257" fill="#888" font-size="10">°C</text>
  <text x="250" y="293" fill="#ccc" font-size="12" text-anchor="middle">Target: 200°C</text>
  <text x="250" y="315" fill="#666" font-size="10" text-anchor="middle">Heater off</text>
  <text x="250" y="340" fill="#888" font-size="7" text-anchor="middle">LED: blue ring</text>

  <!-- State 6: Volcano with Pump -->
  <rect x="340" y="210" width="145" height="145" rx="4" fill="#111" stroke="#00cccc" stroke-width="1"/>
  <text x="412" y="228" fill="#fff" font-size="8" text-anchor="middle">S&amp;B Volcano</text>
  <text x="412" y="270" fill="#ff8c00" font-size="30" font-weight="bold" text-anchor="middle">200.0</text>
  <text x="438" y="257" fill="#888" font-size="10">°C</text>
  <text x="412" y="293" fill="#ccc" font-size="12" text-anchor="middle">Target: 200°C</text>
  <text x="412" y="315" fill="#ff8c00" font-size="11" text-anchor="middle">HEATER ON</text>
  <text x="412" y="332" fill="#00cccc" font-size="11" text-anchor="middle">PUMP ON</text>
  <text x="412" y="348" fill="#888" font-size="7" text-anchor="middle">Volcano only</text>

  <!-- Arrow markers showing state transitions -->
  <line x1="162" y1="118" x2="176" y2="118" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="325" y1="118" x2="338" y2="118" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
</svg>
